            or
            sum by (service, environment) (
              0 * rate(http_requests_total[30m])
            )
          )
          /
          clamp_min(
            sum by (service, environment) (
              rate(http_requests_total[30m])
            ),
            1e-12
          )
      - record: slo:http_availability:burn_rate30m
        expr: slo:http_availability:error_ratio_rate30m / 0.001
      - record: slo:http_availability:error_ratio_rate1h
