# Generated as explicit rules so promtool can validate every SLO/window pair.
groups:
  - name: sli-and-slo-recording-rules
    interval: 30s
    rules:
      - record: slo:http_availability:error_ratio_rate5m
        expr: |
          (
            sum by (service, environment) (
              rate(http_requests_total{status_code=~"5.."}[5m])
            )
            or
            sum by (service, environment) (
              0 * rate(http_requests_total[5m])
            )
          )
          /
          clamp_min(
            sum by (service, environment) (
              rate(http_requests_total[5m])
            ),
            1e-12
          )
      - record: slo:http_availability:burn_rate5m
        expr: slo:http_availability:error_ratio_rate5m / 0.001
      - record: slo:http_availability:error_ratio_rate30m
        expr: |
          (
            sum by (service, environment) (
              rate(http_requests_total{status_code=~"5.."}[30m])
