        annotations:
          summary: http-availability SLO is burning at the slow threshold
          description: Error-budget burn is above 3x in both the 2h and 1d windows.
          runbook_url: docs/runbooks/slo-burn-rate.md
          dashboard_url: http://localhost:3000/d/slo-overview
