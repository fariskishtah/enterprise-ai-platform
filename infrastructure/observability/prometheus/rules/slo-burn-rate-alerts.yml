groups:
  - name: multi-window-multi-burn-rate-alerts
    interval: 30s
    rules:
      - alert: APIAvailabilitySLOBurnFast
        expr: |
          (slo:http_availability:burn_rate5m > 14.4)
          and on (service, environment)
          (slo:http_availability:burn_rate1h > 14.4)
        for: 2m
        labels:
          severity: critical
          service: '{{ $labels.service }}'
          component: backend
          team: platform
          slo: http-availability
        annotations:
          summary: http-availability SLO is burning at the fast threshold
          description: Error-budget burn is above 14.4x in both the 5m and 1h windows.
          runbook_url: docs/runbooks/slo-burn-rate.md
          dashboard_url: http://localhost:3000/d/slo-overview
      - alert: APIAvailabilitySLOBurnMedium
        expr: |
          (slo:http_availability:burn_rate30m > 6)
          and on (service, environment)
          (slo:http_availability:burn_rate6h > 6)
        for: 15m
        labels:
          severity: warning
          service: '{{ $labels.service }}'
          component: backend
          team: platform
          slo: http-availability
        annotations:
          summary: http-availability SLO is burning at the medium threshold
          description: Error-budget burn is above 6x in both the 30m and 6h windows.
          runbook_url: docs/runbooks/slo-burn-rate.md
          dashboard_url: http://localhost:3000/d/slo-overview
      - alert: APIAvailabilitySLOBurnSlow
        expr: |
          (slo:http_availability:burn_rate2h > 3)
          and on (service, environment)
          (slo:http_availability:burn_rate1d > 3)
