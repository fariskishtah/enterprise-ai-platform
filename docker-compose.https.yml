services:
  reverse-proxy:
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:8080"
      - "${PUBLIC_HTTPS_PORT:-443}:8443"
    volumes:
      - ./.deployment/https/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/nginx/routes.inc:/etc/nginx/routes.inc:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ${CERTBOT_WEBROOT:-/var/www/certbot}:/var/www/certbot:ro
