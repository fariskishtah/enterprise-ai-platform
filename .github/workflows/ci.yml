name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/requirements/dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements/dev.txt pip-audit==2.10.0

      - name: Check installed dependencies
        run: python -m pip check

      - name: Audit Python dependencies
        run: python -m pip_audit . --progress-spinner off

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: mypy
        run: mypy app

      - name: Pytest
        run: pytest -q

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prettier
        run: npm run format

      - name: Build and type-check
        run: npm run build

      - name: Audit dependencies
        run: npm audit

  configuration-validation:
    name: Configuration Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      AI_DEFAULT_REGISTERED_MODEL_PREFIX: ai_core
      CORS_ALLOWED_ORIGINS: '["https://production-validation.example"]'
      DATABASE_URL: postgresql+psycopg://ci:ci@postgres:5432/ci
      ENVIRONMENT: test
      GRAFANA_ADMIN_PASSWORD: ci-only-grafana-password
      GRAFANA_ADMIN_USER: ci-admin
      JWT_ALGORITHM: HS256
      JWT_AUDIENCE: ci-audience
      JWT_ISSUER: ci-issuer
      POSTGRES_DB: ci
      POSTGRES_PASSWORD: ci-only-password
      POSTGRES_USER: ci
      PUBLIC_HTTP_PORT: "8080"
      REDIS_URL: redis://redis:6379/0
      REFRESH_TOKEN_EXPIRE_DAYS: "30"
      SECRET_KEY: ci-only-secret-key-with-sufficient-entropy
      TRUSTED_PROXY_IPS: "*"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install YAML parser
        run: python -m pip install "PyYAML>=6.0.2,<7.0.0"

      - name: Parse YAML and Grafana dashboard JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          import yaml

          excluded = {".git", ".venv", "node_modules"}
          yaml_paths = sorted(
              path
              for pattern in ("*.yml", "*.yaml")
              for path in Path(".").rglob(pattern)
              if excluded.isdisjoint(path.parts)
              and not path.name.lower().startswith(("docker-compose", "compose"))
          )
          for path in yaml_paths:
              with path.open(encoding="utf-8") as stream:
                  yaml.safe_load(stream)

          dashboard_paths = sorted(
              Path("infrastructure/observability/grafana/dashboards").glob("*.json")
          )
          for path in dashboard_paths:
              with path.open(encoding="utf-8") as stream:
                  json.load(stream)

          print(
              f"Validated {len(yaml_paths)} YAML files and "
              f"{len(dashboard_paths)} Grafana dashboards."
          )
          PY

      - name: Validate Docker Compose
        run: docker compose config -q

      - name: Validate production Docker Compose
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            config -q
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            --profile observability \
            config -q

      - name: Validate Nginx configuration
        run: |
          docker run --rm \
            --add-host backend:127.0.0.1 \
            --add-host frontend:127.0.0.1 \
            --volume "$PWD/infrastructure/nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro" \
            --volume "$PWD/infrastructure/nginx/routes.inc:/etc/nginx/routes.inc:ro" \
            nginx:1.28.0-alpine \
            nginx -t
          docker run --rm \
            --volume "$PWD/infrastructure/nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:1.28.0-alpine \
            nginx -t

      - name: Validate Prometheus config and rules
        run: |
          docker run --rm \
            --volume "$PWD/infrastructure/observability/prometheus:/etc/prometheus:ro" \
            --entrypoint /bin/promtool \
            prom/prometheus:v3.12.0 \
            check config /etc/prometheus/prometheus.yml
          docker run --rm \
            --volume "$PWD/infrastructure/observability/prometheus:/etc/prometheus:ro" \
            --entrypoint /bin/sh \
            prom/prometheus:v3.12.0 \
            -ec '/bin/promtool check rules /etc/prometheus/rules/*.yml'

      - name: Test Prometheus rules
        run: |
          docker run --rm \
            --volume "$PWD/infrastructure/observability/prometheus:/etc/prometheus:ro" \
            --workdir /etc/prometheus/tests \
            --entrypoint /bin/promtool \
            prom/prometheus:v3.12.0 \
            test rules slo-rules.test.yml

      - name: Validate Alertmanager config
        run: |
          docker run --rm \
            --volume "$PWD/infrastructure/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro" \
            --entrypoint /bin/amtool \
            prom/alertmanager:v0.32.1 \
            check-config /etc/alertmanager/alertmanager.yml

      - name: Validate Tempo config
        run: |
          docker run --rm \
            --volume "$PWD/infrastructure/observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro" \
            grafana/tempo:2.10.5 \
            -config.file=/etc/tempo/tempo.yml \
            -config.verify=true

      - name: Format-check and validate Alloy config
        run: |
          docker run --rm \
            --env COMPOSE_PROJECT_NAME=ci \
            --env LOG_ENVIRONMENT=ci \
            --volume "$PWD/infrastructure/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro" \
            --entrypoint /bin/alloy \
            grafana/alloy:v1.17.1 \
            fmt --test /etc/alloy/config.alloy
          docker run --rm \
            --env COMPOSE_PROJECT_NAME=ci \
            --env LOG_ENVIRONMENT=ci \
            --volume "$PWD/infrastructure/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro" \
            --entrypoint /bin/alloy \
            grafana/alloy:v1.17.1 \
            validate /etc/alloy/config.alloy

      - name: Inspect k6 performance scripts
        run: |
          docker run --rm \
            --volume "$PWD/performance/k6:/scripts:ro" \
            grafana/k6:2.1.0 \
            inspect /scripts/smoke.js
          docker run --rm \
            --volume "$PWD/performance/k6:/scripts:ro" \
            grafana/k6:2.1.0 \
            inspect /scripts/api-load.js
          docker run --rm \
            --volume "$PWD/performance/k6:/scripts:ro" \
            grafana/k6:2.1.0 \
            inspect /scripts/auth-load.js
          docker run --rm \
            --volume "$PWD/performance/k6:/scripts:ro" \
            grafana/k6:2.1.0 \
            inspect /scripts/training-job-load.js

  container-build:
    name: Container Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: docker/backend/Dockerfile
          - name: frontend
            dockerfile: docker/frontend/Dockerfile
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
