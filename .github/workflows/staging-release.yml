name: Staging Release Workflow

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag or SHA to validate and deploy to staging"
        required: true
        default: "latest"
  push:
    branches:
      - staging

permissions:
  contents: read

concurrency:
  group: staging-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  staging-validation:
    name: Staging Deployment Gate & Runtime Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      E2E_ADMIN_EMAIL: admin@staging-release.example.com
      E2E_ENGINEER_EMAIL: engineer@staging-release.example.com
      E2E_OPERATOR_EMAIL: operator@staging-release.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dev dependencies
        working-directory: backend
        run: python -m pip install -r requirements/dev.txt

      - name: Run migration and release readiness gate
        working-directory: backend
        run: pytest tests/test_release_readiness_gate.py tests/test_failure_resilience.py -v

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate disposable staging password
        run: |
          password="$(openssl rand -hex 18)Aa1!"
          echo "::add-mask::$password"
          echo "E2E_PASSWORD=$password" >> "$GITHUB_ENV"

      - name: Start staging runtime
        run: scripts/staging-local.sh start

      - name: Seed staging environment
        run: scripts/staging-local.sh seed

      - name: Execute k6 smoke and API load verification against staging
        run: |
          docker run --rm \
            --network host \
            --volume "$PWD/performance/k6:/scripts:ro" \
            -e BASE_URL=http://127.0.0.1:18080 \
            grafana/k6:2.1.0 \
            run /scripts/smoke.js

      - name: Run read-only staging smoke verification
        env:
          BASE_URL: http://127.0.0.1:18080
          SMOKE_ALLOW_HTTP: "true"
          SMOKE_DOCS_EXPECTED_STATUS: "404"
          SMOKE_EMAIL: engineer@staging-release.example.com
          SMOKE_PASSWORD: ${{ env.E2E_PASSWORD }}
        run: scripts/smoke-production.sh

      - name: Stop staging runtime
        if: always()
        run: scripts/staging-local.sh clean
