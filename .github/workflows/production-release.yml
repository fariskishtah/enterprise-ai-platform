name: Production Release Workflow

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Immutable version tag (e.g. v1.4.0) to release to production"
        required: true
      confirm_release:
        description: "Type 'RELEASE' to confirm production deployment"
        required: true
        default: "NO"

permissions:
  contents: read

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  production-release-gate:
    name: Production Pre-Flight & Migration Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_release }}" != "RELEASE" ]; then
            echo "::error::Production release confirmation string mismatch. Must type 'RELEASE'."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dev dependencies
        working-directory: backend
        run: python -m pip install -r requirements/dev.txt

      - name: Verify Alembic migration upgrade/downgrade chain
        working-directory: backend
        run: pytest tests/test_release_readiness_gate.py -v

      - name: Validate Production Docker Compose Configuration
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config -q
          docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile observability config -q

      - name: Verify release verification and rollback scripts syntax
        run: |
          bash -n scripts/verify-production.sh
          bash -n scripts/rollback-production.sh
          bash -n scripts/smoke-production.sh
