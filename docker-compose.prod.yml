x-production-defaults: &production-defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  backend:
    <<: *production-defaults
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --proxy-headers
      - --forwarded-allow-ips
      - ${TRUSTED_PROXY_IPS:?Set TRUSTED_PROXY_IPS in the production environment file}
    depends_on: !override
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in the production environment file}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in the production environment file}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in the production environment file}
      JWT_ISSUER: ${JWT_ISSUER:?Set JWT_ISSUER in the production environment file}
      JWT_AUDIENCE: ${JWT_AUDIENCE:?Set JWT_AUDIENCE in the production environment file}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS in the production environment file}
      ENVIRONMENT: production
      ENABLE_API_DOCS: "false"
      LOG_ENVIRONMENT: production
      OBSERVABILITY_ENVIRONMENT: production
      OTEL_ENVIRONMENT: production
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
    ports: !reset []
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3).read()
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=64m,uid=10001,gid=10001,mode=1770
    networks:
      - application
      - data
      - observability
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 0.50
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "0.50"
        reservations:
          memory: 256m
          cpus: "0.10"

  training-worker:
    <<: *production-defaults
    depends_on: !override
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in the production environment file}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in the production environment file}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in the production environment file}
      JWT_ISSUER: ${JWT_ISSUER:?Set JWT_ISSUER in the production environment file}
      JWT_AUDIENCE: ${JWT_AUDIENCE:?Set JWT_AUDIENCE in the production environment file}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS in the production environment file}
      ENVIRONMENT: production
      ENABLE_API_DOCS: "false"
      LOG_ENVIRONMENT: production
      OBSERVABILITY_ENVIRONMENT: production
      OTEL_ENVIRONMENT: production
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - from pathlib import Path; assert b'dramatiq' in Path('/proc/1/cmdline').read_bytes()
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=128m,uid=10001,gid=10001,mode=1770
    networks:
      - data
      - observability
    mem_limit: 1536m
    mem_reservation: 512m
    cpus: 0.75
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: "0.75"
        reservations:
          memory: 512m
          cpus: "0.20"

  frontend:
    <<: *production-defaults
    build:
      target: production
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      backend:
        condition: service_healthy
    ports: !reset []
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    user: "101:101"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m,uid=101,gid=101,mode=1770
    networks:
      - application
    mem_limit: 128m
    mem_reservation: 32m
    cpus: 0.15
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.15"
        reservations:
          memory: 32m
          cpus: "0.05"

  postgres:
    <<: *production-defaults
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in the production environment file}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in the production environment file}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the production environment file}
    ports: !reset []
    networks:
      - data
    stop_grace_period: 30s
    mem_limit: 1536m
    mem_reservation: 512m
    cpus: 0.75
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: "0.75"
        reservations:
          memory: 512m
          cpus: "0.20"

  redis:
    <<: *production-defaults
    ports: !reset []
    networks:
      - data
    stop_grace_period: 20s
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.25
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.25"
        reservations:
          memory: 128m
          cpus: "0.05"

  reverse-proxy:
    <<: *production-defaults
    image: nginxinc/nginx-unprivileged:1.28.0-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    user: "101:101"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m,uid=101,gid=101,mode=1770
    volumes:
      - ./infrastructure/nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/nginx/routes.inc:/etc/nginx/routes.inc:ro
    networks:
      - public
      - application
    mem_limit: 128m
    mem_reservation: 32m
    cpus: 0.10
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.10"
        reservations:
          memory: 32m
          cpus: "0.05"

  postgres-exporter:
    <<: *production-defaults
    profiles: ["observability"]
    ports: !reset []
    networks: [data, observability]
    mem_limit: 64m
    mem_reservation: 32m
    cpus: 0.05
    deploy:
      resources:
        limits: {memory: 64m, cpus: "0.05"}
        reservations: {memory: 32m, cpus: "0.02"}

  redis-exporter:
    <<: *production-defaults
    profiles: ["observability"]
    ports: !reset []
    networks: [data, observability]
    mem_limit: 64m
    mem_reservation: 32m
    cpus: 0.05
    deploy:
      resources:
        limits: {memory: 64m, cpus: "0.05"}
        reservations: {memory: 32m, cpus: "0.02"}

  cadvisor:
    <<: *production-defaults
    profiles: ["observability"]
    ports: !reset []
    networks: [observability]
    mem_limit: 128m
    mem_reservation: 64m
    cpus: 0.10
    deploy:
      resources:
        limits: {memory: 128m, cpus: "0.10"}
        reservations: {memory: 64m, cpus: "0.03"}

  alertmanager:
    <<: *production-defaults
    profiles: ["observability"]
    ports: !reset []
    networks: [observability]
    mem_limit: 128m
    mem_reservation: 32m
    cpus: 0.05
    deploy:
      resources:
        limits: {memory: 128m, cpus: "0.05"}
        reservations: {memory: 32m, cpus: "0.02"}

  prometheus:
    <<: *production-defaults
    profiles: ["observability"]
    ports: !reset []
    networks: [observability]
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.25
    deploy:
      resources:
        limits: {memory: 512m, cpus: "0.25"}
        reservations: {memory: 128m, cpus: "0.05"}

  loki:
    <<: *production-defaults
    profiles: ["observability"]
    ports: !reset []
    networks: [observability]
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.20
    deploy:
      resources:
        limits: {memory: 512m, cpus: "0.20"}
        reservations: {memory: 128m, cpus: "0.05"}

  alloy:
    <<: *production-defaults
    profiles: ["observability"]
    ports: !reset []
    environment:
      LOG_ENVIRONMENT: production
    networks: [observability]
    mem_limit: 192m
    mem_reservation: 64m
    cpus: 0.10
    deploy:
      resources:
        limits: {memory: 192m, cpus: "0.10"}
        reservations: {memory: 64m, cpus: "0.03"}

  tempo:
    <<: *production-defaults
    profiles: ["observability"]
    ports: !reset []
    networks: [observability]
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 0.20
    deploy:
      resources:
        limits: {memory: 512m, cpus: "0.20"}
        reservations: {memory: 128m, cpus: "0.05"}

  grafana:
    <<: *production-defaults
    profiles: ["observability"]
    ports: !reset []
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?Set GRAFANA_ADMIN_USER when enabling observability}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD when enabling observability}
      GF_USERS_ALLOW_SIGN_UP: "false"
    networks: [observability]
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.10
    deploy:
      resources:
        limits: {memory: 256m, cpus: "0.10"}
        reservations: {memory: 64m, cpus: "0.03"}

networks:
  public:
  application:
    internal: true
  data:
    internal: true
  observability:
    internal: true
