services:
  migrate:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      ENVIRONMENT: staging
      ENABLE_API_DOCS: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [data]
    restart: "no"
    user: "10001:10001"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=64m,uid=10001,gid=10001,mode=1770

  backend:
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: staging
      LOG_ENVIRONMENT: staging
      OBSERVABILITY_ENVIRONMENT: staging
      OTEL_ENVIRONMENT: staging

  training-worker:
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: staging
      LOG_ENVIRONMENT: staging
      OBSERVABILITY_ENVIRONMENT: staging
      OTEL_ENVIRONMENT: staging

  reverse-proxy:
    build:
      context: .
      dockerfile: docker/reverse-proxy/Dockerfile
    ports:
      - "${PUBLIC_HTTP_PORT:-18080}:8080"

networks:
  data:
    internal: true
