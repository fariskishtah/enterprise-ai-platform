services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENVIRONMENT: ${ENVIRONMENT}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      MLFLOW_TRACKING_URI: file:/app/data/mlflow
      MODEL_ARTIFACT_ROOT: /app/data/model-artifacts
      AI_ARTIFACT_ROOT: /app/data/ai-artifacts
      AI_DEFAULT_REGISTERED_MODEL_PREFIX: ${AI_DEFAULT_REGISTERED_MODEL_PREFIX}
      TRAINING_QUEUE_NAME: ${TRAINING_QUEUE_NAME:-ai-training}
      TRAINING_JOB_MAX_ATTEMPTS: ${TRAINING_JOB_MAX_ATTEMPTS:-3}
      TRAINING_JOB_RETRY_BASE_SECONDS: ${TRAINING_JOB_RETRY_BASE_SECONDS:-5}
      TRAINING_JOB_STALE_AFTER_SECONDS: ${TRAINING_JOB_STALE_AFTER_SECONDS:-3600}
      TRAINING_JOB_ORPHANED_AFTER_SECONDS: ${TRAINING_JOB_ORPHANED_AFTER_SECONDS:-60}
      PROMOTION_AUDIT_PENDING_AFTER_SECONDS: ${PROMOTION_AUDIT_PENDING_AFTER_SECONDS:-300}
      PROMOTION_REGRESSION_MIN_R2: ${PROMOTION_REGRESSION_MIN_R2:-0.0}
      PROMOTION_REGRESSION_MIN_RELATIVE_RMSE_IMPROVEMENT: ${PROMOTION_REGRESSION_MIN_RELATIVE_RMSE_IMPROVEMENT:-0.0}
      PROMOTION_CLASSIFICATION_MIN_ACCURACY: ${PROMOTION_CLASSIFICATION_MIN_ACCURACY:-0.0}
      PROMOTION_CLASSIFICATION_MIN_F1_IMPROVEMENT: ${PROMOTION_CLASSIFICATION_MIN_F1_IMPROVEMENT:-0.0}
      PREDICTION_EVENT_RETENTION_DAYS: ${PREDICTION_EVENT_RETENTION_DAYS:-90}
      PREDICTION_EVENT_RETENTION_BATCH_SIZE: ${PREDICTION_EVENT_RETENTION_BATCH_SIZE:-1000}
      MONITORING_MIN_SAMPLE_COUNT: ${MONITORING_MIN_SAMPLE_COUNT:-20}
      MONITORING_MAX_WINDOW_DAYS: ${MONITORING_MAX_WINDOW_DAYS:-30}
      MONITORING_PROFILE_BIN_COUNT: ${MONITORING_PROFILE_BIN_COUNT:-10}
      MONITORING_MAX_EVENTS_PER_WINDOW: ${MONITORING_MAX_EVENTS_PER_WINDOW:-10000}
      MONITORING_REFERENCE_RECONCILIATION_BATCH_SIZE: ${MONITORING_REFERENCE_RECONCILIATION_BATCH_SIZE:-100}
      MONITORING_SCHEDULING_ENABLED: ${MONITORING_SCHEDULING_ENABLED:-false}
      MONITORING_QUEUE_NAME: ${MONITORING_QUEUE_NAME:-ai-monitoring}
      MONITORING_WINDOW_HOURS: ${MONITORING_WINDOW_HOURS:-24}
      MONITORING_EVALUATION_INTERVAL_SECONDS: ${MONITORING_EVALUATION_INTERVAL_SECONDS:-3600}
      MONITORING_LOCK_TIMEOUT_SECONDS: ${MONITORING_LOCK_TIMEOUT_SECONDS:-1800}
      MONITORING_ELIGIBLE_MODEL_ALIASES: ${MONITORING_ELIGIBLE_MODEL_ALIASES:-champion}
      MONITORING_MAX_MODELS_PER_RUN: ${MONITORING_MAX_MODELS_PER_RUN:-100}
      MONITORING_FAILURE_RATE_WARNING_THRESHOLD: ${MONITORING_FAILURE_RATE_WARNING_THRESHOLD:-0.05}
      MONITORING_FAILURE_RATE_CRITICAL_THRESHOLD: ${MONITORING_FAILURE_RATE_CRITICAL_THRESHOLD:-0.20}
      MONITORING_EVALUATION_RETENTION_DAYS: ${MONITORING_EVALUATION_RETENTION_DAYS:-365}
      MONITORING_EVALUATION_RETENTION_BATCH_SIZE: ${MONITORING_EVALUATION_RETENTION_BATCH_SIZE:-500}
      MONITORING_STALE_ALERT_HOURS: ${MONITORING_STALE_ALERT_HOURS:-168}
      PREDICTION_EVENT_RETENTION_SCHEDULING_ENABLED: ${PREDICTION_EVENT_RETENTION_SCHEDULING_ENABLED:-false}
      MONITORING_EVALUATION_RETENTION_SCHEDULING_ENABLED: ${MONITORING_EVALUATION_RETENTION_SCHEDULING_ENABLED:-false}
      REFERENCE_PROFILE_RECONCILIATION_SCHEDULING_ENABLED: ${REFERENCE_PROFILE_RECONCILIATION_SCHEDULING_ENABLED:-false}
      RETRAINING_RECONCILIATION_SCHEDULING_ENABLED: ${RETRAINING_RECONCILIATION_SCHEDULING_ENABLED:-false}
      STALE_ALERT_RECONCILIATION_SCHEDULING_ENABLED: ${STALE_ALERT_RECONCILIATION_SCHEDULING_ENABLED:-false}
      MONITORING_AUTOMATIC_RETRAINING_ENABLED: ${MONITORING_AUTOMATIC_RETRAINING_ENABLED:-false}
      MONITORING_RETRAINING_ACTOR_USER_ID: ${MONITORING_RETRAINING_ACTOR_USER_ID:-}
      GROUND_TRUTH_MAX_OUTCOMES_PER_SUMMARY: ${GROUND_TRUTH_MAX_OUTCOMES_PER_SUMMARY:-10000}
      DRIFT_PSI_WARNING_THRESHOLD: ${DRIFT_PSI_WARNING_THRESHOLD:-0.10}
      DRIFT_PSI_CRITICAL_THRESHOLD: ${DRIFT_PSI_CRITICAL_THRESHOLD:-0.25}
      DRIFT_MISSING_RATE_WARNING_THRESHOLD: ${DRIFT_MISSING_RATE_WARNING_THRESHOLD:-0.05}
      DRIFT_OUT_OF_RANGE_WARNING_THRESHOLD: ${DRIFT_OUT_OF_RANGE_WARNING_THRESHOLD:-0.10}
      RETRAINING_DEFAULT_COOLDOWN_SECONDS: ${RETRAINING_DEFAULT_COOLDOWN_SECONDS:-86400}
      RETRAINING_DEFAULT_MAX_REQUESTS_PER_DAY: ${RETRAINING_DEFAULT_MAX_REQUESTS_PER_DAY:-1}
      RETRAINING_DEFAULT_MAX_REQUESTS_PER_WEEK: ${RETRAINING_DEFAULT_MAX_REQUESTS_PER_WEEK:-3}
      RETRAINING_DEFAULT_MAX_ACTIVE_REQUESTS: ${RETRAINING_DEFAULT_MAX_ACTIVE_REQUESTS:-1}
      RETRAINING_RECONCILIATION_BATCH_SIZE: ${RETRAINING_RECONCILIATION_BATCH_SIZE:-100}
      RETRAINING_DEFAULT_MINIMUM_DRIFT_STATUS: ${RETRAINING_DEFAULT_MINIMUM_DRIFT_STATUS:-critical}
      RETRAINING_ALLOW_TRUNCATED_DRIFT: ${RETRAINING_ALLOW_TRUNCATED_DRIFT:-true}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - mlflow-data:/app/data/mlflow
      - model-artifact-data:/app/data/model-artifacts
      - ai-artifact-data:/app/data/ai-artifacts

  training-worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    command:
      - dramatiq
      - app.ml.jobs.tasks
      - --processes
      - "1"
      - --threads
      - "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENVIRONMENT: ${ENVIRONMENT}
      MLFLOW_TRACKING_URI: file:/app/data/mlflow
      MODEL_ARTIFACT_ROOT: /app/data/model-artifacts
      AI_ARTIFACT_ROOT: /app/data/ai-artifacts
      AI_DEFAULT_REGISTERED_MODEL_PREFIX: ${AI_DEFAULT_REGISTERED_MODEL_PREFIX}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      TRAINING_QUEUE_NAME: ${TRAINING_QUEUE_NAME:-ai-training}
      TRAINING_JOB_MAX_ATTEMPTS: ${TRAINING_JOB_MAX_ATTEMPTS:-3}
      TRAINING_JOB_RETRY_BASE_SECONDS: ${TRAINING_JOB_RETRY_BASE_SECONDS:-5}
      TRAINING_JOB_STALE_AFTER_SECONDS: ${TRAINING_JOB_STALE_AFTER_SECONDS:-3600}
      TRAINING_JOB_ORPHANED_AFTER_SECONDS: ${TRAINING_JOB_ORPHANED_AFTER_SECONDS:-60}
      PROMOTION_AUDIT_PENDING_AFTER_SECONDS: ${PROMOTION_AUDIT_PENDING_AFTER_SECONDS:-300}
      PROMOTION_REGRESSION_MIN_R2: ${PROMOTION_REGRESSION_MIN_R2:-0.0}
      PROMOTION_REGRESSION_MIN_RELATIVE_RMSE_IMPROVEMENT: ${PROMOTION_REGRESSION_MIN_RELATIVE_RMSE_IMPROVEMENT:-0.0}
      PROMOTION_CLASSIFICATION_MIN_ACCURACY: ${PROMOTION_CLASSIFICATION_MIN_ACCURACY:-0.0}
      PROMOTION_CLASSIFICATION_MIN_F1_IMPROVEMENT: ${PROMOTION_CLASSIFICATION_MIN_F1_IMPROVEMENT:-0.0}
      PREDICTION_EVENT_RETENTION_DAYS: ${PREDICTION_EVENT_RETENTION_DAYS:-90}
      PREDICTION_EVENT_RETENTION_BATCH_SIZE: ${PREDICTION_EVENT_RETENTION_BATCH_SIZE:-1000}
      MONITORING_MIN_SAMPLE_COUNT: ${MONITORING_MIN_SAMPLE_COUNT:-20}
      MONITORING_MAX_WINDOW_DAYS: ${MONITORING_MAX_WINDOW_DAYS:-30}
      MONITORING_PROFILE_BIN_COUNT: ${MONITORING_PROFILE_BIN_COUNT:-10}
      MONITORING_MAX_EVENTS_PER_WINDOW: ${MONITORING_MAX_EVENTS_PER_WINDOW:-10000}
      MONITORING_REFERENCE_RECONCILIATION_BATCH_SIZE: ${MONITORING_REFERENCE_RECONCILIATION_BATCH_SIZE:-100}
      MONITORING_SCHEDULING_ENABLED: ${MONITORING_SCHEDULING_ENABLED:-false}
      MONITORING_QUEUE_NAME: ${MONITORING_QUEUE_NAME:-ai-monitoring}
      MONITORING_WINDOW_HOURS: ${MONITORING_WINDOW_HOURS:-24}
      MONITORING_EVALUATION_INTERVAL_SECONDS: ${MONITORING_EVALUATION_INTERVAL_SECONDS:-3600}
      MONITORING_LOCK_TIMEOUT_SECONDS: ${MONITORING_LOCK_TIMEOUT_SECONDS:-1800}
      MONITORING_ELIGIBLE_MODEL_ALIASES: ${MONITORING_ELIGIBLE_MODEL_ALIASES:-champion}
      MONITORING_MAX_MODELS_PER_RUN: ${MONITORING_MAX_MODELS_PER_RUN:-100}
      MONITORING_FAILURE_RATE_WARNING_THRESHOLD: ${MONITORING_FAILURE_RATE_WARNING_THRESHOLD:-0.05}
      MONITORING_FAILURE_RATE_CRITICAL_THRESHOLD: ${MONITORING_FAILURE_RATE_CRITICAL_THRESHOLD:-0.20}
      MONITORING_EVALUATION_RETENTION_DAYS: ${MONITORING_EVALUATION_RETENTION_DAYS:-365}
      MONITORING_EVALUATION_RETENTION_BATCH_SIZE: ${MONITORING_EVALUATION_RETENTION_BATCH_SIZE:-500}
      MONITORING_STALE_ALERT_HOURS: ${MONITORING_STALE_ALERT_HOURS:-168}
      PREDICTION_EVENT_RETENTION_SCHEDULING_ENABLED: ${PREDICTION_EVENT_RETENTION_SCHEDULING_ENABLED:-false}
      MONITORING_EVALUATION_RETENTION_SCHEDULING_ENABLED: ${MONITORING_EVALUATION_RETENTION_SCHEDULING_ENABLED:-false}
      REFERENCE_PROFILE_RECONCILIATION_SCHEDULING_ENABLED: ${REFERENCE_PROFILE_RECONCILIATION_SCHEDULING_ENABLED:-false}
      RETRAINING_RECONCILIATION_SCHEDULING_ENABLED: ${RETRAINING_RECONCILIATION_SCHEDULING_ENABLED:-false}
      STALE_ALERT_RECONCILIATION_SCHEDULING_ENABLED: ${STALE_ALERT_RECONCILIATION_SCHEDULING_ENABLED:-false}
      MONITORING_AUTOMATIC_RETRAINING_ENABLED: ${MONITORING_AUTOMATIC_RETRAINING_ENABLED:-false}
      MONITORING_RETRAINING_ACTOR_USER_ID: ${MONITORING_RETRAINING_ACTOR_USER_ID:-}
      GROUND_TRUTH_MAX_OUTCOMES_PER_SUMMARY: ${GROUND_TRUTH_MAX_OUTCOMES_PER_SUMMARY:-10000}
      DRIFT_PSI_WARNING_THRESHOLD: ${DRIFT_PSI_WARNING_THRESHOLD:-0.10}
      DRIFT_PSI_CRITICAL_THRESHOLD: ${DRIFT_PSI_CRITICAL_THRESHOLD:-0.25}
      DRIFT_MISSING_RATE_WARNING_THRESHOLD: ${DRIFT_MISSING_RATE_WARNING_THRESHOLD:-0.05}
      DRIFT_OUT_OF_RANGE_WARNING_THRESHOLD: ${DRIFT_OUT_OF_RANGE_WARNING_THRESHOLD:-0.10}
      RETRAINING_DEFAULT_COOLDOWN_SECONDS: ${RETRAINING_DEFAULT_COOLDOWN_SECONDS:-86400}
      RETRAINING_DEFAULT_MAX_REQUESTS_PER_DAY: ${RETRAINING_DEFAULT_MAX_REQUESTS_PER_DAY:-1}
      RETRAINING_DEFAULT_MAX_REQUESTS_PER_WEEK: ${RETRAINING_DEFAULT_MAX_REQUESTS_PER_WEEK:-3}
      RETRAINING_DEFAULT_MAX_ACTIVE_REQUESTS: ${RETRAINING_DEFAULT_MAX_ACTIVE_REQUESTS:-1}
      RETRAINING_RECONCILIATION_BATCH_SIZE: ${RETRAINING_RECONCILIATION_BATCH_SIZE:-100}
      RETRAINING_DEFAULT_MINIMUM_DRIFT_STATUS: ${RETRAINING_DEFAULT_MINIMUM_DRIFT_STATUS:-critical}
      RETRAINING_ALLOW_TRUNCATED_DRIFT: ${RETRAINING_ALLOW_TRUNCATED_DRIFT:-true}
    volumes:
      - mlflow-data:/app/data/mlflow
      - model-artifact-data:/app/data/model-artifacts
      - ai-artifact-data:/app/data/ai-artifacts

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

volumes:
  ai-artifact-data:
  mlflow-data:
  model-artifact-data:
  postgres-data:
  redis-data:
