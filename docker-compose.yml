      MONITORING_AUTOMATIC_RETRAINING_ENABLED: ${MONITORING_AUTOMATIC_RETRAINING_ENABLED:-false}
      MONITORING_RETRAINING_ACTOR_USER_ID: ${MONITORING_RETRAINING_ACTOR_USER_ID:-}
      GROUND_TRUTH_MAX_OUTCOMES_PER_SUMMARY: ${GROUND_TRUTH_MAX_OUTCOMES_PER_SUMMARY:-10000}
      DRIFT_PSI_WARNING_THRESHOLD: ${DRIFT_PSI_WARNING_THRESHOLD:-0.10}
      DRIFT_PSI_CRITICAL_THRESHOLD: ${DRIFT_PSI_CRITICAL_THRESHOLD:-0.25}
      DRIFT_MISSING_RATE_WARNING_THRESHOLD: ${DRIFT_MISSING_RATE_WARNING_THRESHOLD:-0.05}
      DRIFT_OUT_OF_RANGE_WARNING_THRESHOLD: ${DRIFT_OUT_OF_RANGE_WARNING_THRESHOLD:-0.10}
      RETRAINING_DEFAULT_COOLDOWN_SECONDS: ${RETRAINING_DEFAULT_COOLDOWN_SECONDS:-86400}
      RETRAINING_DEFAULT_MAX_REQUESTS_PER_DAY: ${RETRAINING_DEFAULT_MAX_REQUESTS_PER_DAY:-1}
      RETRAINING_DEFAULT_MAX_REQUESTS_PER_WEEK: ${RETRAINING_DEFAULT_MAX_REQUESTS_PER_WEEK:-3}
      RETRAINING_DEFAULT_MAX_ACTIVE_REQUESTS: ${RETRAINING_DEFAULT_MAX_ACTIVE_REQUESTS:-1}
      RETRAINING_RECONCILIATION_BATCH_SIZE: ${RETRAINING_RECONCILIATION_BATCH_SIZE:-100}
      RETRAINING_DEFAULT_MINIMUM_DRIFT_STATUS: ${RETRAINING_DEFAULT_MINIMUM_DRIFT_STATUS:-critical}
      RETRAINING_ALLOW_TRUNCATED_DRIFT: ${RETRAINING_ALLOW_TRUNCATED_DRIFT:-true}
      STRUCTURED_LOGGING_ENABLED: ${STRUCTURED_LOGGING_ENABLED:-true}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HTTP_ACCESS_LOGGING_ENABLED: ${HTTP_ACCESS_LOGGING_ENABLED:-true}
      REQUEST_ID_HEADER: ${REQUEST_ID_HEADER:-X-Request-ID}
      CORRELATION_ID_HEADER: ${CORRELATION_ID_HEADER:-X-Correlation-ID}
      LOG_SERVICE_NAME: ${LOG_SERVICE_NAME:-ai-manufacturing-backend}
      LOG_ENVIRONMENT: ${LOG_ENVIRONMENT:-local}
      OBSERVABILITY_METRICS_ENABLED: ${OBSERVABILITY_METRICS_ENABLED:-true}
      OBSERVABILITY_METRICS_PATH: ${OBSERVABILITY_METRICS_PATH:-/metrics}
      OBSERVABILITY_SERVICE_NAME: ${OBSERVABILITY_SERVICE_NAME:-ai-manufacturing-backend}
      OBSERVABILITY_ENVIRONMENT: ${OBSERVABILITY_ENVIRONMENT:-local}
      OBSERVABILITY_WORKER_METRICS_PORT: ${OBSERVABILITY_WORKER_METRICS_PORT:-9191}
      TRACING_ENABLED: ${TRACING_ENABLED:-true}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-ai-manufacturing-backend}
      OTEL_WORKER_SERVICE_NAME: ${OTEL_WORKER_SERVICE_NAME:-ai-manufacturing-training-worker}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-ai-manufacturing-platform}
      OTEL_ENVIRONMENT: ${OTEL_ENVIRONMENT:-local}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4317}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_traceidratio}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-1.0}
    expose:
      - "9191"
    volumes:
      - mlflow-data:/app/data/mlflow
      - model-artifact-data:/app/data/model-artifacts
      - ai-artifact-data:/app/data/ai-artifacts
      - dataset-data:/app/data/datasets

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: development
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"

  postgres:
    image: pgvector/pgvector:0.8.5-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_manufacturing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_manufacturing_password}
      POSTGRES_USER: ${POSTGRES_USER:-ai_manufacturing}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_URI: postgres:5432/${POSTGRES_DB}?sslmode=disable
      DATA_SOURCE_USER: ${POSTGRES_USER}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD}
    expose:
      - "9187"
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.84.0
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis://redis:6379
    expose:
      - "9121"
    restart: unless-stopped

  cadvisor:
    image: ghcr.io/google/cadvisor:v0.57.0
    command:
      - --docker_only=true
      - --housekeeping_interval=15s
    expose:
      - "8080"
    security_opt:
      - no-new-privileges:true
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.32.1
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --data.retention=120h
      - --enable-feature=utf8-strict-mode
      - --cluster.listen-address=
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${ALERTMANAGER_PORT:-9093}:9093"
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./infrastructure/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.12.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    depends_on:
      backend:
        condition: service_started
      training-worker:
        condition: service_started
      postgres-exporter:
        condition: service_started
      redis-exporter:
        condition: service_started
      cadvisor:
        condition: service_started
      alertmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infrastructure/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7.3
    command:
      - -config.file=/etc/loki/loki-config.yml
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-version"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    volumes:
      - ./infrastructure/observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    mem_limit: 768m
    cpus: 1.0
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.17.1
    command:
      - run
      - --disable-reporting
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    depends_on:
      loki:
        condition: service_healthy
    environment:
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-ai-manufacturing-platform}
      LOG_ENVIRONMENT: ${LOG_ENVIRONMENT:-local}
    healthcheck:
      test: ["CMD", "/bin/alloy", "fmt", "--test", "/etc/alloy/config.alloy"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - "127.0.0.1:${ALLOY_PORT:-12345}:12345"
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./infrastructure/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    mem_limit: 256m
    cpus: 0.5
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.10.5
    command:
      - -config.file=/etc/tempo/tempo.yml
    healthcheck:
      test:
        - CMD
        - /tempo
        - -config.file=/etc/tempo/tempo.yml
        - -config.verify=true
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - "127.0.0.1:${TEMPO_PORT:-3200}:3200"
    expose:
      - "4317"
      - "4318"
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./infrastructure/observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    mem_limit: 768m
    cpus: 1.0
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.1.0
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-replace-with-a-local-password}
      GF_USERS_ALLOW_SIGN_UP: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./infrastructure/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  ai-artifact-data:
  dataset-data:
  mlflow-data:
  model-artifact-data:
  postgres-data:
  redis-data:
  prometheus-data:
  alertmanager-data:
  grafana-data:
  loki-data:
  alloy-data:
  tempo-data:
