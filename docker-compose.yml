services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENVIRONMENT: ${ENVIRONMENT}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      MLFLOW_TRACKING_URI: file:/app/data/mlflow
      MODEL_ARTIFACT_ROOT: /app/data/model-artifacts
      AI_ARTIFACT_ROOT: /app/data/ai-artifacts
      AI_DEFAULT_REGISTERED_MODEL_PREFIX: ${AI_DEFAULT_REGISTERED_MODEL_PREFIX}
      TRAINING_QUEUE_NAME: ${TRAINING_QUEUE_NAME:-ai-training}
      TRAINING_JOB_MAX_ATTEMPTS: ${TRAINING_JOB_MAX_ATTEMPTS:-3}
      TRAINING_JOB_RETRY_BASE_SECONDS: ${TRAINING_JOB_RETRY_BASE_SECONDS:-5}
      TRAINING_JOB_STALE_AFTER_SECONDS: ${TRAINING_JOB_STALE_AFTER_SECONDS:-3600}
      TRAINING_JOB_ORPHANED_AFTER_SECONDS: ${TRAINING_JOB_ORPHANED_AFTER_SECONDS:-60}
      PROMOTION_AUDIT_PENDING_AFTER_SECONDS: ${PROMOTION_AUDIT_PENDING_AFTER_SECONDS:-300}
      PROMOTION_REGRESSION_MIN_R2: ${PROMOTION_REGRESSION_MIN_R2:-0.0}
      PROMOTION_REGRESSION_MIN_RELATIVE_RMSE_IMPROVEMENT: ${PROMOTION_REGRESSION_MIN_RELATIVE_RMSE_IMPROVEMENT:-0.0}
      PROMOTION_CLASSIFICATION_MIN_ACCURACY: ${PROMOTION_CLASSIFICATION_MIN_ACCURACY:-0.0}
      PROMOTION_CLASSIFICATION_MIN_F1_IMPROVEMENT: ${PROMOTION_CLASSIFICATION_MIN_F1_IMPROVEMENT:-0.0}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - mlflow-data:/app/data/mlflow
      - model-artifact-data:/app/data/model-artifacts
      - ai-artifact-data:/app/data/ai-artifacts

  training-worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    command:
      - dramatiq
      - app.ml.jobs.tasks
      - --processes
      - "1"
      - --threads
      - "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENVIRONMENT: ${ENVIRONMENT}
      MLFLOW_TRACKING_URI: file:/app/data/mlflow
      MODEL_ARTIFACT_ROOT: /app/data/model-artifacts
      AI_ARTIFACT_ROOT: /app/data/ai-artifacts
      AI_DEFAULT_REGISTERED_MODEL_PREFIX: ${AI_DEFAULT_REGISTERED_MODEL_PREFIX}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      TRAINING_QUEUE_NAME: ${TRAINING_QUEUE_NAME:-ai-training}
      TRAINING_JOB_MAX_ATTEMPTS: ${TRAINING_JOB_MAX_ATTEMPTS:-3}
      TRAINING_JOB_RETRY_BASE_SECONDS: ${TRAINING_JOB_RETRY_BASE_SECONDS:-5}
      TRAINING_JOB_STALE_AFTER_SECONDS: ${TRAINING_JOB_STALE_AFTER_SECONDS:-3600}
      TRAINING_JOB_ORPHANED_AFTER_SECONDS: ${TRAINING_JOB_ORPHANED_AFTER_SECONDS:-60}
      PROMOTION_AUDIT_PENDING_AFTER_SECONDS: ${PROMOTION_AUDIT_PENDING_AFTER_SECONDS:-300}
      PROMOTION_REGRESSION_MIN_R2: ${PROMOTION_REGRESSION_MIN_R2:-0.0}
      PROMOTION_REGRESSION_MIN_RELATIVE_RMSE_IMPROVEMENT: ${PROMOTION_REGRESSION_MIN_RELATIVE_RMSE_IMPROVEMENT:-0.0}
      PROMOTION_CLASSIFICATION_MIN_ACCURACY: ${PROMOTION_CLASSIFICATION_MIN_ACCURACY:-0.0}
      PROMOTION_CLASSIFICATION_MIN_F1_IMPROVEMENT: ${PROMOTION_CLASSIFICATION_MIN_F1_IMPROVEMENT:-0.0}
    volumes:
      - mlflow-data:/app/data/mlflow
      - model-artifact-data:/app/data/model-artifacts
      - ai-artifact-data:/app/data/ai-artifacts

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

volumes:
  ai-artifact-data:
  mlflow-data:
  model-artifact-data:
  postgres-data:
  redis-data:
